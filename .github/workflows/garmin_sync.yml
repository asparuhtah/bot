name: Garmin Sync

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 08:00 Sofia (зимно) / 09:00 (лятно)
  workflow_dispatch:        # ръчно пускане от GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install garminconnect

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/garmin_sync.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "garmin sync $(date -u +%Y-%m-%d)"
          git push
