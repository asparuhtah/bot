<!-- diet.html — Модул Диета | Аспарух Дашборд -->
<style>
.diet-wrap{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e6edf3}
.diet-grid{display:grid;grid-template-columns:1fr 340px;gap:13px}
@media(max-width:900px){.diet-grid{grid-template-columns:1fr}}

/* Macro bars */
.macro-row{display:flex;gap:10px;margin-bottom:13px;flex-wrap:wrap}
.macro-card{flex:1;min-width:120px;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:10px 13px}
.mc-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.mc-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.mc-sub{font-size:11px;color:#8b949e;margin-top:1px}
.mc-bar{height:4px;background:#30363d;border-radius:2px;margin-top:6px;overflow:hidden}
.mc-fill{height:100%;border-radius:2px;transition:width .4s}

/* Add food panel */
.add-panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px}
.add-title{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.search-wrap{position:relative;margin-bottom:8px}
.search-input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#e6edf3;font-size:13px;outline:none;box-sizing:border-box}
.search-input:focus{border-color:#58a6ff}
.search-input::placeholder{color:#8b949e}
.dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#161b22;border:1px solid #30363d;border-radius:6px;max-height:220px;overflow-y:auto;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.dropdown.show{display:block}
.dd-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:#1c2128}
.dd-name{font-weight:500}
.dd-cat{font-size:10px;color:#8b949e;margin-top:1px}
.dd-macros{font-size:11px;color:#8b949e;white-space:nowrap;text-align:right}

/* Selected food info */
.sel-food{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;margin-bottom:8px;display:none}
.sel-name{font-size:13px;font-weight:600;margin-bottom:6px}
.sel-per100{display:flex;gap:10px;font-size:11px;color:#8b949e;margin-bottom:8px;flex-wrap:wrap}
.sel-per100 span{background:#1c2128;padding:2px 7px;border-radius:4px}
.portion-row{display:flex;gap:7px;align-items:center}
.portion-row label{font-size:12px;color:#8b949e;white-space:nowrap}
.portion-input{width:70px;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:5px 8px;color:#e6edf3;font-size:13px;text-align:center;outline:none}
.portion-input:focus{border-color:#58a6ff}
.meal-select{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:5px 8px;color:#e6edf3;font-size:12px;outline:none;cursor:pointer}
.add-btn{background:#1f6feb;color:#fff;border:none;border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap;transition:background .15s}
.add-btn:hover{background:#388bfd}
.calc-preview{font-size:11px;color:#58a6ff;margin-top:6px;min-height:16px}

/* Log */
.log-panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px}
.log-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.log-title{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.day-nav{display:flex;align-items:center;gap:7px}
.dnav-btn{background:transparent;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:2px 8px;cursor:pointer;font-size:14px;line-height:1.4}
.dnav-btn:hover{border-color:#58a6ff;color:#58a6ff}
.dnav-date{font-size:12px;color:#e6edf3;font-weight:600;min-width:90px;text-align:center}

/* Meal groups */
.meal-group{margin-bottom:10px}
.meal-hdr{font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.4px;padding:5px 0 3px;border-bottom:1px solid #21262d;margin-bottom:4px;display:flex;justify-content:space-between}
.meal-hdr-cals{font-weight:400}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #21262d;gap:8px}
.log-row:last-child{border-bottom:none}
.lr-name{font-size:12px;flex:1}
.lr-portion{font-size:11px;color:#8b949e;white-space:nowrap}
.lr-macros{font-size:11px;color:#8b949e;white-space:nowrap;text-align:right}
.lr-del{background:transparent;border:none;color:#6e7681;cursor:pointer;font-size:14px;padding:0 3px;line-height:1;transition:color .15s}
.lr-del:hover{color:#f85149}

.log-empty{font-size:12px;color:#8b949e;text-align:center;padding:18px 0}

/* Daily total */
.day-total{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;margin-top:10px}
.dt-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.dt-label{color:#8b949e}
.dt-val{font-weight:600;font-variant-numeric:tabular-nums}

/* Water */
.water-section{margin-top:10px}
.water-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;font-weight:600}
.water-drops{display:flex;gap:5px;flex-wrap:wrap}
.wdrop{width:30px;height:30px;border-radius:50%;border:2px solid #30363d;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;opacity:.35;transition:all .2s}
.wdrop.full{border-color:#58a6ff;opacity:1;background:rgba(88,166,255,.12)}

/* IF window */
.if-bar{background:#1c2128;border:1px solid #30363d;border-radius:6px;padding:9px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.if-label{font-size:11px;color:#8b949e}
.if-val{font-size:12px;font-weight:600}
.if-open{color:#3fb950}.if-closed{color:#f85149}

/* Scrollbar */
.dropdown::-webkit-scrollbar{width:5px}
.dropdown::-webkit-scrollbar-track{background:transparent}
.dropdown::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
</style>

<div class="diet-wrap">

<!-- IF window status -->
<div class="if-bar" id="ifBar">
  <span class="if-label">⏳ Intermittent Fasting 16:8</span>
  <span class="if-val" id="ifStatus">—</span>
</div>

<!-- Macro summary bars -->
<div class="macro-row">
  <div class="macro-card">
    <div class="mc-label">Калории</div>
    <div class="mc-val" id="mCalories">0</div>
    <div class="mc-sub">цел: <span id="mCalGoal">1650</span> kcal</div>
    <div class="mc-bar"><div class="mc-fill" id="mCalBar" style="width:0%;background:#f0883e"></div></div>
  </div>
  <div class="macro-card">
    <div class="mc-label">Протеин</div>
    <div class="mc-val" id="mProt">0g</div>
    <div class="mc-sub">цел: 120g</div>
    <div class="mc-bar"><div class="mc-fill" id="mProtBar" style="width:0%;background:#3fb950"></div></div>
  </div>
  <div class="macro-card">
    <div class="mc-label">Мазнини</div>
    <div class="mc-val" id="mFat">0g</div>
    <div class="mc-sub">~55g лимит</div>
    <div class="mc-bar"><div class="mc-fill" id="mFatBar" style="width:0%;background:#d29922"></div></div>
  </div>
  <div class="macro-card">
    <div class="mc-label">Въглехидрати</div>
    <div class="mc-val" id="mCarbs">0g</div>
    <div class="mc-sub">~165g лимит</div>
    <div class="mc-bar"><div class="mc-fill" id="mCarbsBar" style="width:0%;background:#bc8cff"></div></div>
  </div>
</div>

<div class="diet-grid">

<!-- LEFT: LOG -->
<div>
  <div class="log-panel">
    <div class="log-title-row">
      <span class="log-title">Дневник</span>
      <div class="day-nav">
        <button class="dnav-btn" onclick="dietNavDay(-1)">‹</button>
        <span class="dnav-date" id="dietDayLabel">днес</span>
        <button class="dnav-btn" onclick="dietNavDay(1)">›</button>
      </div>
    </div>
    <div id="dietLog"></div>
    <div class="day-total" id="dietDayTotal" style="display:none">
      <div class="dt-row"><span class="dt-label">Общо калории</span><span class="dt-val" id="dtCal">—</span></div>
      <div class="dt-row"><span class="dt-label">Протеин</span><span class="dt-val" id="dtProt">—</span></div>
      <div class="dt-row"><span class="dt-label">Мазнини</span><span class="dt-val" id="dtFat">—</span></div>
      <div class="dt-row"><span class="dt-label">Въглехидрати</span><span class="dt-val" id="dtCarbs">—</span></div>
    </div>
    <!-- Water -->
    <div class="water-section" id="waterSection">
      <div class="water-title">💧 Вода — <span id="waterCount">0</span> / 8 чаши</div>
      <div class="water-drops" id="waterDrops"></div>
    </div>
  </div>
</div>

<!-- RIGHT: ADD FOOD -->
<div>
  <div class="add-panel">
    <div class="add-title">➕ Добави храна</div>

    <div class="search-wrap">
      <input class="search-input" type="text" id="foodSearch" placeholder="Търси от 348 храни..." autocomplete="off"
        oninput="dietSearch(this.value)" onfocus="dietSearch(this.value)">
      <div class="dropdown" id="foodDropdown"></div>
    </div>

    <div class="sel-food" id="selFood">
      <div class="sel-name" id="selFoodName">—</div>
      <div class="sel-per100" id="selFoodPer100"></div>
      <div class="portion-row">
        <label>Порция:</label>
        <input class="portion-input" type="number" id="portionInput" value="100" min="1" max="2000"
          oninput="dietUpdatePreview()">
        <span style="font-size:12px;color:#8b949e">g/ml</span>
        <select class="meal-select" id="mealSelect">
          <option value="закуска">Закуска</option>
          <option value="лека закуска">Лека закуска</option>
          <option value="обяд" selected>Обяд</option>
          <option value="следобедна">Следобедна</option>
          <option value="вечеря">Вечеря</option>
          <option value="друго">Друго</option>
        </select>
      </div>
      <div class="calc-preview" id="calcPreview"></div>
      <div style="margin-top:8px">
        <button class="add-btn" onclick="dietAddEntry()">✓ Добави</button>
      </div>
    </div>

    <!-- Custom entry -->
    <div style="margin-top:12px;border-top:1px solid #21262d;padding-top:10px">
      <div class="add-title" style="margin-bottom:8px">📝 Ръчно добавяне</div>
      <input class="search-input" type="text" id="customName" placeholder="Наименование" style="margin-bottom:5px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
        <input class="search-input" type="number" id="customP" placeholder="Протеин g" min="0">
        <input class="search-input" type="number" id="customF" placeholder="Мазнини g" min="0">
        <input class="search-input" type="number" id="customC" placeholder="Въглехидрати g" min="0">
        <input class="search-input" type="number" id="customPortion" placeholder="Порция g" value="100">
      </div>
      <button class="add-btn" onclick="dietAddCustom()" style="width:100%">Добави ръчно</button>
    </div>
  </div>
</div>

</div>
</div>

// ── STATE ─────────────────────────────────────────────────────────
const GOALS = {cal:1650, prot:120, fat:55, carbs:165};
const IF_START = 12; // noon — eating window 12:00–20:00
const IF_END   = 20;

let selectedFood = null;
let dietDayOffset = 0; // 0 = today, -1 = yesterday, etc.

// ── KEYS ──────────────────────────────────────────────────────────
function dietKey(offset){
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `diet_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function waterKey(offset){
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `health_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function fmtDate(offset){
  const d = new Date(); d.setDate(d.getDate()+offset);
  const days=['Нед','Пон','Вт','Ср','Чет','Пет','Съб'];
  const months=['яну','фев','март','апр','май','юни','юли','авг','сеп','окт','ное','дек'];
  if(offset===0) return 'днес';
  if(offset===-1) return 'вчера';
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

// ── LOAD / SAVE ───────────────────────────────────────────────────
function loadEntries(offset){ return JSON.parse(localStorage.getItem(dietKey(offset))||'[]'); }
function saveEntries(offset, entries){ localStorage.setItem(dietKey(offset), JSON.stringify(entries)); }

// ── IF STATUS ─────────────────────────────────────────────────────
function updateIF(){
  const h = new Date().getHours();
  const open = h >= IF_START && h < IF_END;
  const el = document.getElementById('ifStatus');
  if(!el) return;
  if(open){
    const rem = IF_END - h;
    el.className='if-val if-open';
    el.textContent=`🟢 Прозорец отворен (${rem}ч остават)`;
  } else {
    el.className='if-val if-closed';
    const wait = h < IF_START ? IF_START - h : (24 - h + IF_START);
    el.textContent=`🔴 Гладуване (${wait}ч до 12:00)`;
  }
}

// ── SEARCH ────────────────────────────────────────────────────────
function dietSearch(q){
  const dd = document.getElementById('foodDropdown');
  if(!q || q.length < 1){ dd.classList.remove('show'); return; }
  const ql = q.toLowerCase();
  const results = FOODS.filter(f => f.name.toLowerCase().includes(ql)).slice(0,30);
  if(!results.length){ dd.innerHTML='<div class="dd-item" style="color:#8b949e">Не е намерено</div>'; dd.classList.add('show'); return; }
  dd.innerHTML = results.map((f,i)=>`
    <div class="dd-item" onclick="dietSelectFood(${FOODS.indexOf(f)})">
      <div>
        <div class="dd-name">${f.name}</div>
        <div class="dd-cat">${f.cat}</div>
      </div>
      <div class="dd-macros">П:${f.p}g М:${f.f}g В:${f.c}g<br>${f.e} kcal</div>
    </div>`).join('');
  dd.classList.add('show');
}

function dietSelectFood(idx){
  selectedFood = FOODS[idx];
  document.getElementById('foodSearch').value = selectedFood.name;
  document.getElementById('foodDropdown').classList.remove('show');
  document.getElementById('selFoodName').textContent = selectedFood.name;
  document.getElementById('selFoodPer100').innerHTML =
    `<span>П: ${selectedFood.p}g</span><span>М: ${selectedFood.f}g</span><span>В: ${selectedFood.c}g</span><span>${selectedFood.e} kcal</span><span style="color:#8b949e">на 100g</span>`;
  document.getElementById('selFood').style.display='block';
  document.getElementById('portionInput').value = 100;
  dietUpdatePreview();
}

function dietUpdatePreview(){
  if(!selectedFood) return;
  const g = parseFloat(document.getElementById('portionInput').value) || 0;
  const f = selectedFood;
  const p2=(v)=>Math.round(v*g/100*10)/10;
  document.getElementById('calcPreview').textContent =
    `→ П:${p2(f.p)}g  М:${p2(f.f)}g  В:${p2(f.c)}g  = ${Math.round(f.e*g/100)} kcal`;
}

// ── ADD ENTRY ─────────────────────────────────────────────────────
function dietAddEntry(){
  if(!selectedFood) return;
  const g = parseFloat(document.getElementById('portionInput').value)||0;
  if(g<=0) return;
  const f = selectedFood;
  const entry = {
    name: f.name, meal: document.getElementById('mealSelect').value,
    g: g,
    p: Math.round(f.p*g/100*10)/10,
    fat: Math.round(f.f*g/100*10)/10,
    c: Math.round(f.c*g/100*10)/10,
    e: Math.round(f.e*g/100),
    ts: Date.now()
  };
  const entries = loadEntries(0);
  entries.push(entry);
  saveEntries(0, entries);
  // Reset
  selectedFood = null;
  document.getElementById('foodSearch').value='';
  document.getElementById('selFood').style.display='none';
  document.getElementById('calcPreview').textContent='';
  dietDayOffset = 0;
  renderDiet();
  dispatchEvent(new Event('statsUpdate'));
}

function dietAddCustom(){
  const name = document.getElementById('customName').value.trim();
  const p    = parseFloat(document.getElementById('customP').value)||0;
  const fat  = parseFloat(document.getElementById('customF').value)||0;
  const c    = parseFloat(document.getElementById('customC').value)||0;
  const g    = parseFloat(document.getElementById('customPortion').value)||100;
  if(!name) return;
  const e = Math.round(p*4 + fat*9 + c*4);
  const entry = {
    name, meal: 'друго', g,
    p: Math.round(p*g/100*10)/10,
    fat: Math.round(fat*g/100*10)/10,
    c: Math.round(c*g/100*10)/10,
    e: Math.round(e*g/100),
    ts: Date.now()
  };
  const entries = loadEntries(0);
  entries.push(entry);
  saveEntries(0, entries);
  document.getElementById('customName').value='';
  document.getElementById('customP').value='';
  document.getElementById('customF').value='';
  document.getElementById('customC').value='';
  document.getElementById('customPortion').value='100';
  dietDayOffset = 0;
  renderDiet();
  dispatchEvent(new Event('statsUpdate'));
}

function dietDeleteEntry(ts){
  const entries = loadEntries(dietDayOffset).filter(e => e.ts !== ts);
  saveEntries(dietDayOffset, entries);
  renderDiet();
  if(dietDayOffset===0) dispatchEvent(new Event('statsUpdate'));
}

// ── NAV ───────────────────────────────────────────────────────────
function dietNavDay(d){
  dietDayOffset += d;
  if(dietDayOffset > 0) dietDayOffset = 0;
  renderDiet();
}

// ── RENDER ────────────────────────────────────────────────────────
const MEAL_ORDER = ['закуска','лека закуска','обяд','следобедна','вечеря','друго'];
const MEAL_LABELS = {'закуска':'🌅 Закуска','лека закуска':'🍎 Лека закуска','обяд':'🍽️ Обяд','следобедна':'☕ Следобедна','вечеря':'🌙 Вечеря','друго':'📦 Друго'};

function renderDiet(){
  const entries = loadEntries(dietDayOffset);
  document.getElementById('dietDayLabel').textContent = fmtDate(dietDayOffset);

  // Totals
  let totP=0,totF=0,totC=0,totE=0;
  entries.forEach(e=>{ totP+=e.p; totF+=e.fat; totC+=e.c; totE+=e.e; });
  totP=Math.round(totP*10)/10; totF=Math.round(totF*10)/10;
  totC=Math.round(totC*10)/10; totE=Math.round(totE);

  // Macro bars
  const pct=(v,max)=>Math.min(100,Math.round(v/max*100));
  document.getElementById('mCalories').textContent=totE;
  document.getElementById('mProt').textContent=totP+'g';
  document.getElementById('mFat').textContent=totF+'g';
  document.getElementById('mCarbs').textContent=totC+'g';
  const calPct=pct(totE,GOALS.cal);
  document.getElementById('mCalBar').style.width=calPct+'%';
  document.getElementById('mCalBar').style.background=calPct>105?'#f85149':calPct>90?'#3fb950':'#f0883e';
  document.getElementById('mProtBar').style.width=pct(totP,GOALS.prot)+'%';
  document.getElementById('mFatBar').style.width=pct(totF,GOALS.fat)+'%';
  document.getElementById('mCarbsBar').style.width=pct(totC,GOALS.carbs)+'%';

  // Group by meal
  const byMeal = {};
  entries.forEach(e=>{
    const m = e.meal||'друго';
    if(!byMeal[m]) byMeal[m]=[];
    byMeal[m].push(e);
  });

  let html='';
  if(!entries.length){
    html='<div class="log-empty">Няма добавени храни</div>';
  } else {
    MEAL_ORDER.forEach(meal=>{
      if(!byMeal[meal]) return;
      const items = byMeal[meal];
      const mCal = items.reduce((s,e)=>s+e.e,0);
      html+=`<div class="meal-group">
        <div class="meal-hdr">
          <span>${MEAL_LABELS[meal]||meal}</span>
          <span class="meal-hdr-cals">${Math.round(mCal)} kcal</span>
        </div>`;
      items.forEach(e=>{
        html+=`<div class="log-row">
          <span class="lr-name">${e.name}</span>
          <span class="lr-portion">${e.g}g</span>
          <span class="lr-macros">П${e.p} М${e.fat} В${e.c} | ${e.e}k</span>
          <button class="lr-del" onclick="dietDeleteEntry(${e.ts})">✕</button>
        </div>`;
      });
      html+='</div>';
    });
  }
  document.getElementById('dietLog').innerHTML=html;

  // Day total
  const dt = document.getElementById('dietDayTotal');
  if(entries.length){
    dt.style.display='block';
    const calColor = totE > GOALS.cal ? '#f85149' : totE > GOALS.cal*0.9 ? '#3fb950' : '#e6edf3';
    document.getElementById('dtCal').innerHTML=`<span style="color:${calColor}">${totE} / ${GOALS.cal} kcal</span>`;
    document.getElementById('dtProt').innerHTML=`<span style="color:${totP>=GOALS.prot?'#3fb950':'#e6edf3'}">${totP}g / ${GOALS.prot}g</span>`;
    document.getElementById('dtFat').textContent=`${totF}g`;
    document.getElementById('dtCarbs').textContent=`${totC}g`;
  } else {
    dt.style.display='none';
  }

  // Water
  renderWater();
}

// ── WATER ─────────────────────────────────────────────────────────
function renderWater(){
  const hKey = waterKey(dietDayOffset);
  const h = JSON.parse(localStorage.getItem(hKey)||'{}');
  const w = h.water || 0;
  document.getElementById('waterCount').textContent = w;
  let html='';
  for(let i=1;i<=8;i++){
    html+=`<div class="wdrop ${i<=w?'full':''}" onclick="dietSetWater(${i})">💧</div>`;
  }
  document.getElementById('waterDrops').innerHTML=html;
}

function dietSetWater(n){
  const hKey = waterKey(dietDayOffset);
  const h = JSON.parse(localStorage.getItem(hKey)||'{}');
  h.water = (h.water===n) ? n-1 : n;
  localStorage.setItem(hKey, JSON.stringify(h));
  renderWater();
  dispatchEvent(new Event('statsUpdate'));
}

// ── CLOSE DROPDOWN ON OUTSIDE CLICK ──────────────────────────────
document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap'))
    document.getElementById('foodDropdown').classList.remove('show');
});

// ── INIT ──────────────────────────────────────────────────────────
updateIF();
setInterval(updateIF, 60000);
renderDiet();

})();
</script>
