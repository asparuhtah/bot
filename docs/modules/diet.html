<!-- diet.html — Модул Диета v2 -->
<style>
.dw{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e6edf3}

/* Macro summary */
.macro-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.mc{flex:1;min-width:110px;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:9px 12px}
.mc-lbl{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.mc-val{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
.mc-sub{font-size:10px;color:#8b949e;margin-top:1px}
.mc-bar{height:4px;background:#21262d;border-radius:2px;margin-top:5px;overflow:hidden}
.mc-fill{height:100%;border-radius:2px;transition:width .4s}

/* Main layout */
.d-layout{display:grid;grid-template-columns:1fr 380px;gap:12px}
@media(max-width:860px){.d-layout{grid-template-columns:1fr}}

/* Log panel */
.log-panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:13px}
.panel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.panel-title{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.day-nav{display:flex;align-items:center;gap:6px}
.dnav{background:transparent;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:2px 8px;cursor:pointer;font-size:14px}
.dnav:hover{border-color:#58a6ff;color:#58a6ff}
.dnav-lbl{font-size:12px;font-weight:600;min-width:80px;text-align:center}

.meal-grp{margin-bottom:8px}
.meal-hdr{font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.4px;padding:4px 0 3px;border-bottom:1px solid #21262d;margin-bottom:3px;display:flex;justify-content:space-between}
.log-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(33,38,45,.6);font-size:12px}
.log-row:last-child{border-bottom:none}
.lr-n{flex:1;font-weight:500}
.lr-g{color:#8b949e;white-space:nowrap;min-width:35px;text-align:right}
.lr-e{color:#f0883e;font-weight:600;white-space:nowrap;min-width:55px;text-align:right}
.lr-m{font-size:10px;color:#8b949e;white-space:nowrap}
.lr-del{background:transparent;border:none;color:#484f58;cursor:pointer;font-size:13px;padding:0 2px;transition:color .15s}
.lr-del:hover{color:#f85149}
.log-empty{font-size:12px;color:#8b949e;text-align:center;padding:16px}

/* Day totals */
.day-tot{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:9px 12px;margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:3px}
.dt-r{display:flex;justify-content:space-between;font-size:12px;padding:1px 0}
.dt-l{color:#8b949e}
.dt-v{font-weight:600}

/* Water */
.water-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.water-lbl{font-size:11px;color:#8b949e;white-space:nowrap}
.wdrop{width:28px;height:28px;border-radius:50%;border:2px solid #30363d;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:.3;transition:all .2s}
.wdrop.full{border-color:#58a6ff;opacity:1;background:rgba(88,166,255,.12)}

/* Right panel tabs */
.rpanel{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}
.rtabs{display:flex;border-bottom:1px solid #30363d}
.rtab{flex:1;padding:9px;text-align:center;font-size:11px;font-weight:600;color:#8b949e;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;border:none;background:transparent}
.rtab:hover{color:#e6edf3}
.rtab.on{color:#58a6ff;border-bottom:2px solid #58a6ff;margin-bottom:-1px}
.rtab-body{padding:13px;display:none}
.rtab-body.on{display:block}

/* Add food form */
.form-row{margin-bottom:8px}
.form-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.sel{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:7px 10px;color:#e6edf3;font-size:13px;outline:none;cursor:pointer;box-sizing:border-box}
.sel:focus{border-color:#58a6ff}

/* Food search with suggestions */
.food-search-wrap{position:relative}
.food-inp{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:7px 10px;color:#e6edf3;font-size:13px;outline:none;box-sizing:border-box}
.food-inp:focus{border-color:#58a6ff}
.food-inp::placeholder{color:#484f58}
.suggestions{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#161b22;border:1px solid #30363d;border-radius:6px;max-height:200px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.suggestions.show{display:block}
.sug-item{padding:7px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.focused{background:#1c2128}
.sug-name{font-weight:500}
.sug-macros{font-size:10px;color:#8b949e;text-align:right;white-space:nowrap}

/* Portion + meal row */
.add-controls{display:grid;grid-template-columns:80px 1fr;gap:7px;margin-top:7px}
.num-inp{background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:7px 9px;color:#e6edf3;font-size:13px;outline:none;text-align:center;width:100%;box-sizing:border-box}
.num-inp:focus{border-color:#58a6ff}
.preview-strip{font-size:11px;color:#58a6ff;min-height:16px;margin:5px 0}
.add-btn{width:100%;background:#1f6feb;color:#fff;border:none;border-radius:5px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px}
.add-btn:hover{background:#388bfd}
.add-btn:disabled{background:#30363d;color:#8b949e;cursor:default}

/* IF bar */
.if-bar{background:#1c2128;border:1px solid #30363d;border-radius:6px;padding:7px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:12px}

/* DB tab */
.db-search{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:6px 10px;color:#e6edf3;font-size:12px;outline:none;box-sizing:border-box;margin-bottom:8px}
.db-search:focus{border-color:#58a6ff}
.db-table{width:100%;border-collapse:collapse;font-size:11px}
.db-table th{padding:4px 6px;text-align:left;color:#8b949e;font-weight:600;border-bottom:1px solid #30363d;font-size:10px;text-transform:uppercase}
.db-table td{padding:4px 6px;border-bottom:1px solid #21262d}
.db-table tr:hover td{background:#1c2128}
.db-add-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:4px;margin-top:8px}
.db-inp{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:4px 6px;color:#e6edf3;font-size:11px;outline:none;width:100%;box-sizing:border-box}
.db-inp:focus{border-color:#58a6ff}
.db-inp::placeholder{color:#484f58}
.db-add-btn{background:#1f6feb;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;white-space:nowrap}

/* Scrollbar */
.suggestions::-webkit-scrollbar,.db-scroll::-webkit-scrollbar{width:4px}
.suggestions::-webkit-scrollbar-thumb,.db-scroll::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
</style>

<div class="dw">

<!-- IF status bar -->
<div class="if-bar" id="ifBar">
  <span style="color:#8b949e">⏳ IF 16:8</span>
  <span id="ifStatus">—</span>
</div>

<!-- Macro summary -->
<div class="macro-row">
  <div class="mc">
    <div class="mc-lbl">Калории</div>
    <div class="mc-val" id="mCal">0</div>
    <div class="mc-sub">цел: 1650 kcal</div>
    <div class="mc-bar"><div class="mc-fill" id="mCalBar" style="width:0%;background:#f0883e"></div></div>
  </div>
  <div class="mc">
    <div class="mc-lbl">Протеин</div>
    <div class="mc-val" id="mPro">0g</div>
    <div class="mc-sub">цел: 120g</div>
    <div class="mc-bar"><div class="mc-fill" id="mProBar" style="width:0%;background:#3fb950"></div></div>
  </div>
  <div class="mc">
    <div class="mc-lbl">Мазнини</div>
    <div class="mc-val" id="mFat">0g</div>
    <div class="mc-sub">лимит: 55g</div>
    <div class="mc-bar"><div class="mc-fill" id="mFatBar" style="width:0%;background:#d29922"></div></div>
  </div>
  <div class="mc">
    <div class="mc-lbl">Въглехидрати</div>
    <div class="mc-val" id="mCarb">0g</div>
    <div class="mc-sub">лимит: 165g</div>
    <div class="mc-bar"><div class="mc-fill" id="mCarbBar" style="width:0%;background:#bc8cff"></div></div>
  </div>
</div>

<div class="d-layout">

<!-- LEFT: Log -->
<div>
  <div class="log-panel">
    <div class="panel-hdr">
      <span class="panel-title">Дневник</span>
      <div class="day-nav">
        <button class="dnav" onclick="dNav(-1)">‹</button>
        <span class="dnav-lbl" id="dNavLbl">днес</span>
        <button class="dnav" onclick="dNav(1)">›</button>
      </div>
    </div>
    <div id="dietLog"></div>
    <div class="day-tot" id="dayTot" style="display:none">
      <div class="dt-r"><span class="dt-l">Калории</span><span class="dt-v" id="totCal">—</span></div>
      <div class="dt-r"><span class="dt-l">Протеин</span><span class="dt-v" id="totPro">—</span></div>
      <div class="dt-r"><span class="dt-l">Мазнини</span><span class="dt-v" id="totFat">—</span></div>
      <div class="dt-r"><span class="dt-l">Въглехидрати</span><span class="dt-v" id="totCarb">—</span></div>
    </div>
    

    <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:11px 13px;margin-top:8px;display:flex;align-items:center;gap:10px">
      <span style="font-size:12px;font-weight:600;color:#8b949e;white-space:nowrap">💧 Вода — <span id="wCount">0</span> / 8 чаши</span>
      <div id="wDrops" style="display:flex;flex-direction:row;gap:5px"></div>
    </div>
  </div>
</div>

<!-- RIGHT: Add + DB -->
<div>
  <div class="rpanel">
    <div class="rtabs">
      <button class="rtab on" onclick="dTab('add',this)">➕ Добави</button>
      <button class="rtab" onclick="dTab('db',this)">📋 База данни</button>
    </div>

    <!-- ADD TAB -->
    <div class="rtab-body on" id="tab-add">

      <!-- Category -->
      <div class="form-row">
        <div class="form-label">Категория</div>
        <select class="sel" id="dCat" onchange="dFilterCat()">
          <option value="">— Всички категории —</option>
          <option>Месо, месни продукти и яйца</option>
          <option>Риба и рибни продукти</option>
          <option>Мляко и млечни продукти</option>
          <option>Хлебни изделия и зърнени храни</option>
          <option>Зеленчуци</option>
          <option>Плодове и ядки</option>
          <option>Други хранителни продукти</option>
          <option>Захарни изделия</option>
          <option>Безалкохолни Напитки</option>
        </select>
      </div>

      <!-- Food search -->
      <div class="form-row">
        <div class="form-label">Храна <span id="dCatCount" style="color:#484f58;font-weight:400"></span></div>
        <div class="food-search-wrap">
          <input class="food-inp" id="dFoodInp" type="text" placeholder="Търси или избери храна..."
            autocomplete="off" oninput="dSearchFood()" onfocus="dSearchFood()" onkeydown="dKeyNav(event)">
          <div class="suggestions" id="dSuggestions"></div>
        </div>
      </div>

      <!-- Selected food info -->
      <div id="dSelInfo" style="display:none;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:8px;margin-bottom:8px">
        <div id="dSelName" style="font-size:13px;font-weight:600;margin-bottom:5px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:11px">
          <span id="dSelP" style="background:#1c2128;padding:2px 7px;border-radius:4px"></span>
          <span id="dSelF" style="background:#1c2128;padding:2px 7px;border-radius:4px"></span>
          <span id="dSelC" style="background:#1c2128;padding:2px 7px;border-radius:4px"></span>
          <span id="dSelE" style="background:#1c2128;padding:2px 7px;border-radius:4px;color:#f0883e"></span>
          <span style="color:#8b949e">на 100g</span>
        </div>
      </div>

      <!-- Portion + meal -->
      <div class="form-row">
        <div class="form-label">Порция и хранене</div>
        <div class="add-controls">
          <div>
            <input class="num-inp" type="number" id="dGrams" value="100" min="1" max="3000"
              placeholder="g" oninput="dPreview()">
          </div>
          <select class="sel" id="dMeal">
            <option value="закуска">🌅 Закуска</option>
            <option value="лека закуска">🍎 Лека закуска</option>
            <option value="обяд" selected>🍽️ Обяд</option>
            <option value="следобедна">☕ Следобедна</option>
            <option value="вечеря">🌙 Вечеря</option>
            <option value="друго">📦 Друго</option>
          </select>
        </div>
        <div class="preview-strip" id="dPreview"></div>
      </div>

      <button class="add-btn" id="dAddBtn" onclick="dAddEntry()" disabled>Избери храна първо</button>

      <!-- Divider -->
      <div style="border-top:1px solid #21262d;margin:12px 0"></div>

      <!-- Manual entry -->
      <div class="form-label" style="margin-bottom:6px">📝 Ръчно добавяне</div>
      <input class="food-inp" id="mName" placeholder="Наименование" style="margin-bottom:5px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
        <input class="num-inp" id="mP" type="number" placeholder="Протеин g" min="0" style="text-align:left;padding:6px 9px">
        <input class="num-inp" id="mF" type="number" placeholder="Мазнини g" min="0" style="text-align:left;padding:6px 9px">
        <input class="num-inp" id="mC" type="number" placeholder="Въглехидрати g" min="0" style="text-align:left;padding:6px 9px">
        <input class="num-inp" id="mG" type="number" placeholder="Порция g" value="100" min="1" style="text-align:left;padding:6px 9px">
      </div>
      <select class="sel" id="mMeal" style="margin-bottom:5px">
        <option value="закуска">🌅 Закуска</option>
        <option value="обяд" selected>🍽️ Обяд</option>
        <option value="вечеря">🌙 Вечеря</option>
        <option value="друго">📦 Друго</option>
      </select>
      <button class="add-btn" onclick="dAddManual()" style="background:#21262d;border:1px solid #30363d;color:#e6edf3">Добави ръчно</button>
    </div>

    <!-- DB TAB -->
    <div class="rtab-body" id="tab-db">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:11px;color:#8b949e" id="dbCount"></span>
        <select class="sel" id="dbCatFilter" onchange="dRenderDB()" style="width:auto;font-size:11px;padding:4px 8px">
          <option value="">Всички</option>
          <option>Месо, месни продукти и яйца</option>
          <option>Риба и рибни продукти</option>
          <option>Мляко и млечни продукти</option>
          <option>Хлебни изделия и зърнени храни</option>
          <option>Зеленчуци</option>
          <option>Плодове и ядки</option>
          <option>Други хранителни продукти</option>
          <option>Захарни изделия</option>
          <option>Безалкохолни Напитки</option>
        </select>
      </div>
      <input class="db-search" id="dbSearch" placeholder="Търси в базата..." oninput="dRenderDB()">
      <div class="db-scroll" style="max-height:280px;overflow-y:auto">
        <table class="db-table" id="dbTable">
          <thead><tr><th>Храна</th><th>П</th><th>М</th><th>В</th><th>kcal</th><th></th></tr></thead>
          <tbody id="dbBody"></tbody>
        </table>
      </div>
      <!-- Add new food to DB -->
      <div style="border-top:1px solid #30363d;margin-top:10px;padding-top:10px">
        <div class="form-label" style="margin-bottom:6px">➕ Добави към базата</div>
        <div style="margin-bottom:5px">
          <input class="db-inp" id="nbName" placeholder="Наименование" style="width:100%;margin-bottom:4px">
          <select class="sel" id="nbCat" style="font-size:12px;margin-bottom:4px">
            <option>Месо, месни продукти и яйца</option>
            <option>Риба и рибни продукти</option>
            <option>Мляко и млечни продукти</option>
            <option>Хлебни изделия и зърнени храни</option>
            <option>Зеленчуци</option>
            <option>Плодове и ядки</option>
            <option>Други хранителни продукти</option>
            <option>Захарни изделия</option>
            <option>Безалкохолни Напитки</option>
          </select>
        </div>
        <div class="db-add-row">
          <input class="db-inp" id="nbP" type="number" placeholder="Протеин" min="0">
          <input class="db-inp" id="nbF" type="number" placeholder="Мазнини" min="0">
          <input class="db-inp" id="nbC" type="number" placeholder="Въглехидрати" min="0">
          <input class="db-inp" id="nbE" type="number" placeholder="kcal" min="0">
          <button class="db-add-btn" onclick="dAddToDB()">Добави</button>
        </div>
        <div id="dbAddStatus" style="font-size:11px;margin-top:4px;min-height:14px"></div>
      </div>
    </div>
  </div>
</div>

</div>
</div>
<script>
// ═══════════════ DIET MODULE v2 ═══════════════

const DIET_GOALS = {cal:1650, prot:120, fat:55, carbs:165};
const DIET_IF_START = 12, DIET_IF_END = 20;
const MEAL_ORDER = ['закуска','лека закуска','обяд','следобедна','вечеря','друго'];
const MEAL_ICONS = {закуска:'🌅',"лека закуска":'🍎',обяд:'🍽️',следобедна:'☕',вечеря:'🌙',друго:'📦'};

let dSelectedFood = null;
let dDayOffset    = 0;

function dGetDB(){
  try{
    const custom = JSON.parse(localStorage.getItem('diet_custom_foods')||'[]');
    return [...FOODS_BASE, ...custom];
  }catch{ return FOODS_BASE; }
}

// ── KEYS ─────────────────────────────────────────────────────────
function dDateStr(offset){
  const d=new Date(); d.setDate(d.getDate()+offset);
  return d.toISOString().split('T')[0];
}
function dDayKey(o){ return 'diet2_'+dDateStr(o); }
function dWaterKey(o){ return 'health_'+dDateStr(o).replace(/-/g,'_'); }
function dLoadEntries(o){ return JSON.parse(localStorage.getItem(dDayKey(o))||'[]'); }
function dSaveEntries(o,e){ localStorage.setItem(dDayKey(o), JSON.stringify(e)); }

// ── IF STATUS ─────────────────────────────────────────────────────
function dUpdateIF(){
  const h=new Date().getHours();
  const open=h>=DIET_IF_START&&h<DIET_IF_END;
  const el=document.getElementById('ifStatus');
  if(!el)return;
  if(open){
    const rem=DIET_IF_END-h;
    el.style.color='#3fb950';
    el.textContent=`🟢 Прозорец отворен — ${rem}ч остават`;
  }else{
    const wait=h<DIET_IF_START?DIET_IF_START-h:(24-h+DIET_IF_START);
    el.style.color='#f85149';
    el.textContent=`🔴 Гладуване — ${wait}ч до 12:00`;
  }
}

// ── CATEGORY FILTER ───────────────────────────────────────────────
function dFilterCat(){
  dSelectedFood = null;
  document.getElementById('dFoodInp').value = '';
  document.getElementById('dSelInfo').style.display = 'none';
  document.getElementById('dPreview').textContent = '';
  const btn = document.getElementById('dAddBtn');
  btn.disabled = true; btn.textContent = 'Избери храна първо';
  dUpdateCatCount();
  dSearchFood();
}

function dUpdateCatCount(){
  const cat = document.getElementById('dCat').value;
  const db  = dGetDB();
  const cnt = cat ? db.filter(f=>f.cat===cat).length : db.length;
  document.getElementById('dCatCount').textContent = `(${cnt} храни)`;
}

// ── FOOD SEARCH ───────────────────────────────────────────────────
function dSearchFood(){
  const q   = document.getElementById('dFoodInp').value.trim().toLowerCase();
  const cat = document.getElementById('dCat').value;
  const db  = dGetDB();
  dSugFocus = -1;

  let results = cat ? db.filter(f=>f.cat===cat) : db;
  if(q) results = results.filter(f=>f.name.toLowerCase().includes(q));
  results = results.slice(0,40);

  const dd = document.getElementById('dSuggestions');
  if(!results.length){
    dd.innerHTML='<div class="sug-item" style="color:#8b949e;cursor:default">Не е намерено</div>';
    dd.classList.add('show'); return;
  }
  dd.innerHTML = results.map((f,i)=>`
    <div class="sug-item" data-idx="${dGetDB().indexOf(f)}" onclick="dSelectFood(${dGetDB().indexOf(f)})">
      <div>
        <div class="sug-name">${f.name}</div>
        <div style="font-size:10px;color:#8b949e">${f.cat}</div>
      </div>
      <div class="sug-macros">П:${f.p}g М:${f.f}g В:${f.c}g<br><strong style="color:#f0883e">${f.e}kcal</strong></div>
    </div>`).join('');
  dd.classList.add('show');
}

function dKeyNav(e){
  const items = document.querySelectorAll('#dSuggestions .sug-item');
  if(!items.length) return;
  if(e.key==='ArrowDown'){ dSugFocus=Math.min(dSugFocus+1,items.length-1); }
  else if(e.key==='ArrowUp'){ dSugFocus=Math.max(dSugFocus-1,0); }
  else if(e.key==='Enter' && dSugFocus>=0){ items[dSugFocus].click(); return; }
  else if(e.key==='Escape'){ document.getElementById('dSuggestions').classList.remove('show'); return; }
  items.forEach((el,i)=>el.classList.toggle('focused',i===dSugFocus));
  if(dSugFocus>=0) items[dSugFocus].scrollIntoView({block:'nearest'});
}

function dSelectFood(idx){
  const db = dGetDB();
  dSelectedFood = db[idx];
  document.getElementById('dFoodInp').value = dSelectedFood.name;
  document.getElementById('dSuggestions').classList.remove('show');
  document.getElementById('dSelName').textContent = dSelectedFood.name;
  document.getElementById('dSelP').textContent = 'П: '+dSelectedFood.p+'g';
  document.getElementById('dSelF').textContent = 'М: '+dSelectedFood.f+'g';
  document.getElementById('dSelC').textContent = 'В: '+dSelectedFood.c+'g';
  document.getElementById('dSelE').textContent = dSelectedFood.e+' kcal';
  document.getElementById('dSelInfo').style.display = 'block';
  const btn = document.getElementById('dAddBtn');
  btn.disabled = false; btn.textContent = '✓ Добави към дневника';
  dPreview();
}

function dPreview(){
  if(!dSelectedFood) return;
  const g = parseFloat(document.getElementById('dGrams').value)||0;
  const f = dSelectedFood;
  const r = v=>Math.round(v*g/100*10)/10;
  document.getElementById('dPreview').textContent =
    g>0 ? `→ П:${r(f.p)}g  М:${r(f.f)}g  В:${r(f.c)}g  =  ${Math.round(f.e*g/100)} kcal` : '';
}

// ── ADD ENTRY ─────────────────────────────────────────────────────
function dAddEntry(){
  if(!dSelectedFood) return;
  const g = parseFloat(document.getElementById('dGrams').value)||0;
  if(g<=0) return;
  const f = dSelectedFood;
  const entry = {
    name: f.name,
    meal: document.getElementById('dMeal').value,
    g, ts: Date.now(),
    p:  Math.round(f.p*g/100*10)/10,
    fat:Math.round(f.f*g/100*10)/10,
    c:  Math.round(f.c*g/100*10)/10,
    e:  Math.round(f.e*g/100),
  };
  const entries = dLoadEntries(0);
  entries.push(entry);
  dSaveEntries(0, entries);
  // reset
  dSelectedFood = null;
  document.getElementById('dFoodInp').value = '';
  document.getElementById('dSelInfo').style.display = 'none';
  document.getElementById('dPreview').textContent = '';
  document.getElementById('dGrams').value = 100;
  const btn = document.getElementById('dAddBtn');
  btn.disabled = true; btn.textContent = 'Избери храна първо';
  dDayOffset = 0;
  dRender();
  dispatchEvent(new Event('statsUpdate'));
}

function dAddManual(){
  const name = document.getElementById('mName').value.trim();
  if(!name) return;
  const p   = parseFloat(document.getElementById('mP').value)||0;
  const fat = parseFloat(document.getElementById('mF').value)||0;
  const c   = parseFloat(document.getElementById('mC').value)||0;
  const g   = parseFloat(document.getElementById('mG').value)||100;
  const e   = Math.round(p*4+fat*9+c*4);
  const entry = {
    name, meal: document.getElementById('mMeal').value,
    g, ts: Date.now(),
    p: Math.round(p*g/100*10)/10,
    fat: Math.round(fat*g/100*10)/10,
    c: Math.round(c*g/100*10)/10,
    e: Math.round(e*g/100),
  };
  const entries = dLoadEntries(0);
  entries.push(entry);
  dSaveEntries(0, entries);
  document.getElementById('mName').value='';
  document.getElementById('mP').value='';
  document.getElementById('mF').value='';
  document.getElementById('mC').value='';
  dDayOffset = 0;
  dRender();
  dispatchEvent(new Event('statsUpdate'));
}

function dDeleteEntry(ts){
  const entries = dLoadEntries(dDayOffset).filter(e=>e.ts!==ts);
  dSaveEntries(dDayOffset, entries);
  dRender();
  if(dDayOffset===0) dispatchEvent(new Event('statsUpdate'));
}

// ── DATABASE TAB ──────────────────────────────────────────────────
function dTab(name, btn){
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.rtab-body').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tab-'+name).classList.add('on');
  if(name==='db') dRenderDB();
}

function dRenderDB(){
  const q   = (document.getElementById('dbSearch').value||'').toLowerCase();
  const cat = document.getElementById('dbCatFilter').value;
  const db  = dGetDB();
  let rows  = cat ? db.filter(f=>f.cat===cat) : db;
  if(q) rows = rows.filter(f=>f.name.toLowerCase().includes(q));
  document.getElementById('dbCount').textContent = `${rows.length} от ${db.length} храни`;
  document.getElementById('dbBody').innerHTML = rows.slice(0,100).map((f,i)=>`
    <tr>
      <td title="${f.cat}">${f.name}${f.custom?'<span style="color:#58a6ff;font-size:9px"> ★</span>':''}</td>
      <td>${f.p}</td><td>${f.f}</td><td>${f.c}</td>
      <td style="color:#f0883e;font-weight:600">${f.e}</td>
      <td><button onclick="dSelectFromDB(${db.indexOf(f)})" style="background:transparent;border:none;color:#58a6ff;cursor:pointer;font-size:11px;padding:0">+</button>${f.custom?`<button onclick="dDeleteFromDB('${f.name}')" style="background:transparent;border:none;color:#f85149;cursor:pointer;font-size:11px;padding:0 3px">✕</button>`:''}</td>
    </tr>`).join('');
}

function dSelectFromDB(idx){
  dTab('add', document.querySelector('.rtab'));
  dSelectFood(idx);
}

function dAddToDB(){
  const name = document.getElementById('nbName').value.trim();
  if(!name){ document.getElementById('dbAddStatus').textContent='Въведи наименование'; return; }
  const p = parseFloat(document.getElementById('nbP').value)||0;
  const fat = parseFloat(document.getElementById('nbF').value)||0;
  const c = parseFloat(document.getElementById('nbC').value)||0;
  const e = parseFloat(document.getElementById('nbE').value)||Math.round(p*4+fat*9+c*4);
  const cat = document.getElementById('nbCat').value;
  const newFood = {cat, name, p, f:fat, c, e, custom:true};
  const custom = JSON.parse(localStorage.getItem('diet_custom_foods')||'[]');
  custom.push(newFood);
  localStorage.setItem('diet_custom_foods', JSON.stringify(custom));
  document.getElementById('nbName').value='';
  document.getElementById('nbP').value='';
  document.getElementById('nbF').value='';
  document.getElementById('nbC').value='';
  document.getElementById('nbE').value='';
  document.getElementById('dbAddStatus').textContent='✓ Добавено!';
  document.getElementById('dbAddStatus').style.color='#3fb950';
  setTimeout(()=>document.getElementById('dbAddStatus').textContent='',2000);
  dRenderDB();
  dUpdateCatCount();
}

function dDeleteFromDB(name){
  const custom = JSON.parse(localStorage.getItem('diet_custom_foods')||'[]').filter(f=>f.name!==name);
  localStorage.setItem('diet_custom_foods', JSON.stringify(custom));
  dRenderDB();
}

// ── NAV ───────────────────────────────────────────────────────────
function dNav(d){
  dDayOffset = Math.min(0, dDayOffset+d);
  dRender();
}

// ── RENDER ────────────────────────────────────────────────────────
function dFmtDate(o){
  if(o===0)return'днес';
  if(o===-1)return'вчера';
  const d=new Date();d.setDate(d.getDate()+o);
  const days=['нед','пон','вт','ср','чет','пет','съб'];
  const mon=['яну','фев','март','апр','май','юни','юли','авг','сеп','окт','ное','дек'];
  return `${days[d.getDay()]} ${d.getDate()} ${mon[d.getMonth()]}`;
}

function dRender(){
  const entries = dLoadEntries(dDayOffset);
  document.getElementById('dNavLbl').textContent = dFmtDate(dDayOffset);

  let totP=0,totF=0,totC=0,totE=0;
  entries.forEach(e=>{totP+=e.p;totF+=e.fat;totC+=e.c;totE+=e.e;});
  totP=Math.round(totP*10)/10; totF=Math.round(totF*10)/10;
  totC=Math.round(totC*10)/10; totE=Math.round(totE);

  // Macro bars
  const pct=(v,max)=>Math.min(105,Math.round(v/max*100));
  document.getElementById('mCal').textContent=totE;
  document.getElementById('mPro').textContent=totP+'g';
  document.getElementById('mFat').textContent=totF+'g';
  document.getElementById('mCarb').textContent=totC+'g';
  const cp=pct(totE,DIET_GOALS.cal);
  document.getElementById('mCalBar').style.cssText=`width:${cp}%;background:${cp>100?'#f85149':cp>85?'#3fb950':'#f0883e'}`;
  document.getElementById('mProBar').style.cssText=`width:${pct(totP,DIET_GOALS.prot)}%;background:#3fb950`;
  document.getElementById('mFatBar').style.cssText=`width:${pct(totF,DIET_GOALS.fat)}%;background:#d29922`;
  document.getElementById('mCarbBar').style.cssText=`width:${pct(totC,DIET_GOALS.carbs)}%;background:#bc8cff`;

  // Group by meal
  const byMeal={};
  entries.forEach(e=>{const m=e.meal||'друго';if(!byMeal[m])byMeal[m]=[];byMeal[m].push(e);});

  let html='';
  if(!entries.length){
    html='<div class="log-empty">Няма добавени храни</div>';
  } else {
    MEAL_ORDER.forEach(meal=>{
      if(!byMeal[meal])return;
      const items=byMeal[meal];
      const mE=items.reduce((s,e)=>s+e.e,0);
      html+=`<div class="meal-grp"><div class="meal-hdr">
        <span>${MEAL_ICONS[meal]||''} ${meal.charAt(0).toUpperCase()+meal.slice(1)}</span>
        <span>${Math.round(mE)} kcal</span></div>`;
      items.forEach(e=>{
        html+=`<div class="log-row">
          <span class="lr-n">${e.name}</span>
          <span class="lr-g">${e.g}g</span>
          <span class="lr-m">П${e.p} М${e.fat} В${e.c}</span>
          <span class="lr-e">${e.e}k</span>
          <button class="lr-del" onclick="dDeleteEntry(${e.ts})">✕</button>
        </div>`;
      });
      html+='</div>';
    });
  }
  document.getElementById('dietLog').innerHTML=html;

  // Totals
  const totEl=document.getElementById('dayTot');
  if(entries.length){
    totEl.style.display='grid';
    const cc=totE>DIET_GOALS.cal?'#f85149':totE>DIET_GOALS.cal*.9?'#3fb950':'#e6edf3';
    document.getElementById('totCal').innerHTML=`<span style="color:${cc}">${totE} / ${DIET_GOALS.cal}</span>`;
    document.getElementById('totPro').innerHTML=`<span style="color:${totP>=DIET_GOALS.prot?'#3fb950':'#e6edf3'}">${totP}g / ${DIET_GOALS.prot}g</span>`;
    document.getElementById('totFat').textContent=totF+'g';
    document.getElementById('totCarb').textContent=totC+'g';
  } else { totEl.style.display='none'; }

  // Water
  dRenderWater();
}

function dRenderWater(){
  const k=dWaterKey(dDayOffset);
  const h=JSON.parse(localStorage.getItem(k)||'{}');
  const w=h.water||0;
  document.getElementById('wCount').textContent=w;
  let html='';
  for(let i=1;i<=8;i++)
    html+=`<div class="wdrop ${i<=w?'full':''}" onclick="dSetWater(${i})">💧</div>`;
  document.getElementById('wDrops').innerHTML=html;
}

function dSetWater(n){
  const k=dWaterKey(dDayOffset);
  const h=JSON.parse(localStorage.getItem(k)||'{}');
  h.water=(h.water===n)?n-1:n;
  localStorage.setItem(k,JSON.stringify(h));
  dRenderWater();
  dispatchEvent(new Event('statsUpdate'));
}

// ── CLOSE SUGGESTIONS ON OUTSIDE CLICK ───────────────────────────
if(!window._dietV2Init){
  window._dietV2Init=true;
  document.addEventListener('click',e=>{
    if(!e.target.closest('.food-search-wrap'))
      document.getElementById('dSuggestions')?.classList.remove('show');
  });
  setInterval(dUpdateIF,60000);
}

// ── INIT ─────────────────────────────────────────────────────────
dUpdateIF();
dUpdateCatCount();
dRender();

</script>
